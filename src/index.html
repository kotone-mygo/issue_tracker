<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- List View -->
        <div id="listView">
            <header>
                <h1>Issue Tracker</h1>
                <div class="header-actions">
                    <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Toggle theme">☀</button>
                    <button id="newIssueBtn" class="btn-primary">+ New Issue</button>
                    <div class="menu-container">
                        <button id="menuBtn" class="menu-btn">☰</button>
                        <div id="menuDropdown" class="menu-dropdown hidden">
                            <button id="exportBtn" class="menu-item">Export</button>
                            <button id="importBtn" class="menu-item">Import</button>
                        </div>
                    </div>
                </div>
            </header>

            <div class="search-bar">
                <div class="search-input-wrapper">
                    <input type="text" id="searchInput" placeholder="Search issues... (press / to focus)">
                    <button id="clearSearchBtn" class="clear-search-btn hidden">&times;</button>
                </div>
                <button id="searchBtn" class="btn-primary">Search</button>
            </div>

            <div class="filters">
                <div class="filters-left">
                    <select id="statusFilter" style="display:none;">
                        <option value="">All Status</option>
                        <option value="Open">Open</option>
                        <option value="InProgress">In Progress</option>
                        <option value="Closed">Closed</option>
                    </select>
                    <div class="custom-select" data-select-id="statusFilter">
                        <div class="custom-select-trigger">All Status</div>
                        <div class="custom-select-options">
                            <div class="custom-select-option selected" data-value="">All Status</div>
                            <div class="custom-select-option" data-value="Open">Open</div>
                            <div class="custom-select-option" data-value="InProgress">In Progress</div>
                            <div class="custom-select-option" data-value="Closed">Closed</div>
                        </div>
                    </div>
                    <select id="tagFilter" style="display:none;">
                        <option value="">All Tags</option>
                    </select>
                    <div class="custom-select" data-select-id="tagFilter">
                        <div class="custom-select-trigger">All Tags</div>
                        <div class="custom-select-options">
                            <div class="custom-select-option selected" data-value="">All Tags</div>
                        </div>
                    </div>
                    <select id="sortByFilter" style="display:none;">
                        <option value="created">Sort By: Created</option>
                        <option value="updated">Sort By: Updated</option>
                    </select>
                    <div class="custom-select" data-select-id="sortByFilter">
                        <div class="custom-select-trigger">Sort By: Created</div>
                        <div class="custom-select-options">
                            <div class="custom-select-option selected" data-value="created">Sort By: Created</div>
                            <div class="custom-select-option" data-value="updated">Sort By: Updated</div>
                        </div>
                    </div>
                </div>
                <button id="directionBtn" class="direction-btn">
                    <span id="directionIcon">↓</span>
                    <span id="directionText">Newest</span>
                </button>
            </div>

            <div id="issuesList" class="issues-list"></div>
        </div>

        <!-- Detail View -->
        <div id="detailView" class="hidden">
            <header>
                <div class="detail-nav-actions">
                    <button id="backBtn" class="btn-secondary">← Back</button>
                    <button id="prevIssueBtn" class="btn-secondary hidden">Previous Issue</button>
                </div>
                <div class="detail-actions">
                    <button id="editIssueBtn" class="btn-primary">Edit</button>
                    <button id="deleteIssueBtn" class="btn-danger">Delete</button>
                </div>
            </header>

            <div id="detailContent" class="detail-content"></div>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="issueModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">New Issue</h2>
            <form id="issueForm">
                <input type="hidden" id="issueId">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="4"></textarea>
                </div>
                <input type="hidden" id="status" value="Open">
                <div class="form-group">
                    <label for="tags">Tags (comma separated)</label>
                    <input type="text" id="tags" placeholder="bug, feature, urgent">
                </div>
                <button type="submit" class="btn-primary">Save</button>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h2>Delete Issue</h2>
            <p>Are you sure you want to delete this issue? This action cannot be undone.</p>
            <div class="modal-actions">
                <button id="confirmDelete" class="btn-danger">Delete</button>
                <button id="cancelDelete" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Import Confirmation Modal -->
    <div id="importModal" class="modal">
        <div class="modal-content">
            <h2>Import Issues</h2>
            <p>How would you like to import the issues?</p>
            <div class="modal-actions">
                <button id="importMerge" class="btn-primary">Merge</button>
                <button id="importOverwrite" class="btn-danger">Overwrite</button>
                <button id="cancelImport" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Hidden file input for import -->
    <input type="file" id="fileInput" accept=".json" style="display: none;">

    <button id="backToTopBtn" class="back-to-top hidden">↑</button>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
