<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
</head>
<body>
    <div class="app">
        <!-- List View -->
        <div id="listView">
            <header>
                <h1>Issue Tracker</h1>
                <button id="newIssueBtn" class="btn-primary">+ New Issue</button>
            </header>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search issues... (press / to focus)">
                <button id="searchBtn" class="btn-primary">Search</button>
            </div>

            <div class="filters">
                <select id="statusFilter">
                    <option value="">All Status</option>
                    <option value="Open">Open</option>
                    <option value="InProgress">In Progress</option>
                    <option value="Closed">Closed</option>
                </select>
                <select id="tagFilter">
                    <option value="">All Tags</option>
                </select>
            </div>

            <div id="issuesList" class="issues-list"></div>
        </div>

        <!-- Detail View -->
        <div id="detailView" class="hidden">
            <header>
                <button id="backBtn" class="btn-secondary">← Back</button>
                <div class="detail-actions">
                    <button id="editIssueBtn" class="btn-primary">Edit</button>
                    <button id="deleteIssueBtn" class="btn-danger">Delete</button>
                </div>
            </header>

            <div id="detailContent" class="detail-content"></div>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="issueModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">New Issue</h2>
            <form id="issueForm">
                <input type="hidden" id="issueId">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status">
                        <option value="Open">Open</option>
                        <option value="InProgress">In Progress</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="tags">Tags (comma separated)</label>
                    <input type="text" id="tags" placeholder="bug, feature, urgent">
                </div>
                <button type="submit" class="btn-primary">Save</button>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h2>Delete Issue</h2>
            <p>Are you sure you want to delete this issue? This action cannot be undone.</p>
            <div class="modal-actions">
                <button id="confirmDelete" class="btn-danger">Delete</button>
                <button id="cancelDelete" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <button id="backToTopBtn" class="back-to-top hidden">↑</button>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
