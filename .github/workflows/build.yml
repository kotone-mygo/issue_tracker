name: Build Issue Tracker

on:
  push:
    branches: [main]
    tags:
      - "v*" # 当推送版本标签时触发
  pull_request:
    branches: [main]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    strategy:
      fail-fast: false # 一个平台失败不影响其他平台
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: issue-tracker_*.deb # 根据你配置的输出文件名调整
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: issue-tracker_*.dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: issue-tracker_*.exe # 或者是 *.msi

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # 安装系统依赖（仅 Linux）
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      # 安装 Rust (使用 actions-rs/toolchain 已废弃，推荐使用 dtolnay/rust-toolchain)
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      # 缓存 Cargo 依赖
      - name: Cache Cargo
        uses: actions/cache@v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # 设置 Node.js 环境（Tauri CLI 需要）
      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "lts/*" # 可根据项目需求调整
          cache: "npm" # 如果项目有 package-lock.json 会自动缓存

      # 安装前端依赖（如果有 package.json）
      - name: Install frontend dependencies
        run: npm install # 如果使用 yarn 则改为 yarn install

      # 构建应用
      - name: Build app
        run: npm run tauri build

      - name: List generated files (Linux/macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: |
          echo "Listing contents of src-tauri/target/release/bundle/"
          ls -R src-tauri/target/release/bundle/

      - name: List generated files (Windows)
        if: runner.os == 'Windows'
        run: |
          Get-ChildItem -Path src-tauri\target\release\bundle\ -Recurse
        shell: pwsh

      # 上传构建产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: issue-tracker-${{ runner.os }}
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: warn # 若找不到檔案僅警告，不中斷流程（方便除錯）

  # 如果需要发布 Release（当推送标签时自动创建 Release 并上传所有平台的安装包）
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Display structure of artifacts
        run: ls -R artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
